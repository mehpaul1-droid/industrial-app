name: industrial_app
description: FarmWise AI System

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP requests (AI + API)
  http: ^1.2.2

  # Charts
  fl_chart: ^0.68.0

  # Local database (offline farm storage)
  sqflite: ^2.3.3+1

  # Path helper for SQLite
  path: ^1.9.0

  # State management (optional but useful)
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
